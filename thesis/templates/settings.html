{% extends "base.html" %}
{% block title %}Pengaturan — Thesis Master{% endblock %}
{% block content %}
<div class="mb-8">
    <h2 class="text-3xl font-bold text-white">Pengaturan</h2>
    <p class="text-gray-400 mt-1">Konfigurasi API keys dan preferensi</p>
</div>

<div class="max-w-2xl space-y-6">
    <!-- API Keys -->
    <div class="bg-dark-800 rounded-xl border border-dark-700 p-6">
        <h3 class="text-lg font-semibold text-white mb-4"><i class="fas fa-key mr-2 text-yellow-400"></i>API Keys</h3>
        <div class="space-y-4">
            <div>
                <label class="text-sm text-gray-400 mb-1 block">OpenAI API Key</label>
                <input type="password" id="openai-key" value="{{ config.get('openai_api_key', '') }}" placeholder="sk-..."
                    class="w-full bg-dark-700 border border-dark-700 rounded-lg px-4 py-3 text-white text-sm">
                <p class="text-xs text-gray-600 mt-1">Untuk fitur AI: summarize, paraphrase, grammar check</p>
            </div>
            <div>
                <label class="text-sm text-gray-400 mb-1 block">Semantic Scholar API Key (opsional)</label>
                <input type="password" id="s2-key" value="{{ config.get('semantic_scholar_api_key', '') }}" placeholder="..."
                    class="w-full bg-dark-700 border border-dark-700 rounded-lg px-4 py-3 text-white text-sm">
            </div>
            <div>
                <label class="text-sm text-gray-400 mb-1 block">Ollama Base URL (untuk AI lokal)</label>
                <input type="text" id="ollama-url" value="{{ config.get('ollama_base_url', 'http://localhost:11434') }}"
                    class="w-full bg-dark-700 border border-dark-700 rounded-lg px-4 py-3 text-white text-sm">
            </div>
        </div>
    </div>

    <!-- Thesis Info -->
    <div class="bg-dark-800 rounded-xl border border-dark-700 p-6">
        <h3 class="text-lg font-semibold text-white mb-4"><i class="fas fa-graduation-cap mr-2 text-primary-400"></i>Info Skripsi</h3>
        <div class="space-y-4">
            <div>
                <label class="text-sm text-gray-400 mb-1 block">Judul Skripsi</label>
                <input type="text" id="thesis-title" placeholder="Judul skripsimu..."
                    class="w-full bg-dark-700 border border-dark-700 rounded-lg px-4 py-3 text-white text-sm">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-sm text-gray-400 mb-1 block">Nama Lengkap</label>
                    <input type="text" id="thesis-author" placeholder="Nama..."
                        class="w-full bg-dark-700 border border-dark-700 rounded-lg px-4 py-3 text-white text-sm">
                </div>
                <div>
                    <label class="text-sm text-gray-400 mb-1 block">NIM</label>
                    <input type="text" id="thesis-nim" placeholder="NIM..."
                        class="w-full bg-dark-700 border border-dark-700 rounded-lg px-4 py-3 text-white text-sm">
                </div>
            </div>
            <div>
                <label class="text-sm text-gray-400 mb-1 block">Universitas</label>
                <input type="text" id="thesis-uni" placeholder="Nama universitas..."
                    class="w-full bg-dark-700 border border-dark-700 rounded-lg px-4 py-3 text-white text-sm">
            </div>
        </div>
    </div>

    <button onclick="saveSettings()" class="w-full bg-primary-600 hover:bg-primary-700 px-6 py-3 rounded-lg text-white font-medium">
        <i class="fas fa-save mr-2"></i>Simpan Pengaturan
    </button>
</div>
{% endblock %}

{% block scripts %}
<script>
function saveSettings() {
    alert('Pengaturan disimpan! (Fitur persist akan datang)');
}
</script>
{% endblock %}
